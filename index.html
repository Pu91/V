<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Multiple Barcode Printer</title>
    
    <!-- JsBarcode Library -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

    <style>
        /* Basic Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .controls-container {
            background-color: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        h2 {
            color: #333;
            margin-top: 0;
        }

        .input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            outline: none;
        }

        #barcodeInput { width: 200px; }
        #quantityInput { width: 80px; text-align: center; }

        input:focus { border-color: #007bff; }

        .btn {
            padding: 10px 20px;
            font-size: 16px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }

        .btn-add { background-color: #28a745; }
        .btn-add:hover { background-color: #218838; }

        .btn-print { background-color: #007bff; display: none; }
        .btn-print:hover { background-color: #0069d9; }

        .btn-clear { background-color: #dc3545; display: none; }
        .btn-clear:hover { background-color: #c82333; }

        /* বারকোড রাখার জায়গা (Screen View) */
        #printArea {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-sizing: border-box;
            min-height: 50px;
        }

        .barcode-item {
            text-align: center;
            background: #fff;
            padding: 5px;
            border: 1px dashed #ccc;
            border-radius: 5px;
        }

        /* --- Print CSS --- */
        @media print {
            /* পেজের মার্জিন কমানো হয়েছে যাতে ব্রাউজারের ডিফল্ট লেখা না আসে */
            @page {
                size: A4;
                margin: 5mm; 
            }
            body {
                background-color: white;
                margin: 0;
                padding: 0;
            }
            .controls-container {
                display: none !important;
            }
            #printArea {
                box-shadow: none;
                border: none;
                padding: 0;
                width: 100%;
                display: flex;
                flex-wrap: wrap;
                justify-content: flex-start;
                align-content: flex-start;
                gap: 2mm; /* স্টিকারগুলোর মাঝের গ্যাপ */
            }
            .barcode-item {
                border: none;
                page-break-inside: avoid;
                break-inside: avoid;
                margin: 0;
                padding: 0;
                /* প্রফেশনাল স্টিকারের নির্দিষ্ট সাইজ (এখানে ৪ কলামে বসার মত সাইজ দেওয়া হয়েছে) */
                width: 48mm; 
                height: 25mm; 
                display: flex;
                justify-content: center;
                align-items: center;
                overflow: hidden;
            }
            
            /* প্রিন্টের সময় বারকোড যেন বক্সের বাইরে না যায় */
            .barcode-item svg {
                max-width: 100%;
                max-height: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="controls-container">
        <h2>Multi-Barcode Printer</h2>
        
        <div class="input-group">
            <input type="text" id="barcodeInput" placeholder="Enter Barcode..." autocomplete="off">
            <input type="number" id="quantityInput" placeholder="Qty" min="1" value="1">
        </div>
        
        <div>
            <button class="btn btn-add" onclick="addBarcodes()">Add Barcodes</button>
            <button class="btn btn-print" id="printBtn" onclick="openPrintPage()">Print All</button>
            <button class="btn btn-clear" id="clearBtn" onclick="clearAll()">Clear All</button>
        </div>
    </div>

    <!-- বারকোডগুলো এখানে জমা হবে -->
    <div id="printArea"></div>

    <script>
        let barcodeIdCounter = 0; 

        function addBarcodes() {
            let inputVal = document.getElementById("barcodeInput").value.trim();
            let quantity = parseInt(document.getElementById("quantityInput").value);
            let printArea = document.getElementById("printArea");
            let printBtn = document.getElementById("printBtn");
            let clearBtn = document.getElementById("clearBtn");

            if (inputVal === "" || isNaN(quantity) || quantity <= 0) {
                alert("Please enter a valid text and quantity!");
                return;
            }

            for (let i = 0; i < quantity; i++) {
                barcodeIdCounter++;
                let currentId = "barcode-" + barcodeIdCounter;

                let barcodeWrapper = document.createElement("div");
                barcodeWrapper.className = "barcode-item";

                let svgElement = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                svgElement.id = currentId;

                barcodeWrapper.appendChild(svgElement);
                printArea.appendChild(barcodeWrapper);

                try {
                    // বারকোড জেনারেট করার সেটিংসে পরিবর্তন করা হয়েছে
                    JsBarcode("#" + currentId, inputVal, {
                        format: "CODE128",
                        lineColor: "#000000",
                        width: 1.2,       // বারের পুরুত্ব কমানো হয়েছে পরিষ্কার বোঝার জন্য
                        height: 35,       // উচ্চতা কমানো হয়েছে
                        displayValue: true,
                        fontSize: 12,     // টেক্সটের সাইজ ছোট করা হয়েছে
                        margin: 5,        // আশপাশের সাদা অংশ কমানো হয়েছে
                        textMargin: 2     // বারকোড এবং টেক্সটের মাঝের গ্যাপ
                    });
                } catch (error) {
                    console.error("Error generating barcode:", error);
                }
            }

            printBtn.style.display = "inline-block";
            clearBtn.style.display = "inline-block";
            
            document.getElementById("barcodeInput").value = "";
            document.getElementById("quantityInput").value = "1";
            document.getElementById("barcodeInput").focus();
        }

        function openPrintPage() {
            window.print();
        }

        function clearAll() {
            document.getElementById("printArea").innerHTML = "";
            document.getElementById("printBtn").style.display = "none";
            document.getElementById("clearBtn").style.display = "none";
            barcodeIdCounter = 0;
        }
    </script>

</body>
</html>
